var _iqaPendingChanges = 0;

function _updateIqaSaveBtn() {
  var btn = document.querySelector('.qa-tab-content [onclick="iqaConfirmSave()"]');
  if (!btn) btn = document.querySelector('[onclick="iqaConfirmSave()"]');
  if (!btn) return;
  if (_iqaPendingChanges > 0) {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check-all me-1"></i>บันทึก ' + _iqaPendingChanges + ' การเปลี่ยนแปลง';
    btn.classList.remove("qa-btn-ghost");
    btn.classList.add("qa-btn-primary");
  } else {
    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-check-all me-1"></i>ไม่มีการเปลี่ยนแปลง';
    btn.classList.remove("qa-btn-primary");
    btn.classList.add("qa-btn-ghost");
  }
}

function _loadIqaMapping() {
  if (!APP.iqaMapping) APP.iqaMapping = {};
  if (APP.theme && APP.theme.iqaMapping) {
    try { APP.iqaMapping = JSON.parse(APP.theme.iqaMapping); } catch(e) { APP.iqaMapping = {}; }
  }
}

function _iqaGetUniquePages(phase) {
  var seen = {}, result = [];
  Object.values(IQA_PAGES).forEach(function(p) {
    if (p.phase !== phase) return;
    if (!seen[p.route]) { seen[p.route] = true; result.push(p); }
  });
  return result;
}

function initIqaTab() {
  if (!APP.iqaMapping) APP.iqaMapping = {};
  _iqaShowStep1();
}

function iqaSelectPhase(phase) {
  _iqaCurrentPhase = phase;
  var b1 = document.getElementById("iqa-phase1-btn");
  var b2 = document.getElementById("iqa-phase2-btn");
  if (b1) b1.className = phase === "Phase1" ? "qa-btn-primary btn-sm" : "qa-btn-ghost btn-sm";
  if (b2) b2.className = phase === "Phase2" ? "qa-btn-primary btn-sm" : "qa-btn-ghost btn-sm";
  _iqaShowStep1();
}

function _iqaShowStep1() {
  var container = document.getElementById("iqa-page-list");
  if (!container) return;

  var pages = _iqaGetUniquePages(_iqaCurrentPhase);

  var html = '<div class="qa-iqa-step mb-4">'
    + '<div class="qa-iqa-step-num">1</div>'
    + '<div><div class="qa-iqa-step-label">เลือกหน้า IQA ที่ต้องการ Mapping</div>'
    + '<div class="qa-iqa-step-sub">กดที่หน้าใดหน้าหนึ่ง เพื่อกำหนดว่าข้อมูลจาก Form ใดตรงกับหน้านั้น</div></div>'
    + '<div class="qa-iqa-step-line"></div>'
    + '<div class="qa-iqa-step-num" style="background:var(--border);color:var(--txt-muted);">2</div>'
    + '<div><div class="qa-iqa-step-label" style="color:var(--txt-muted);">Map Field</div>'
    + '<div class="qa-iqa-step-sub">เลือกว่า field ใดตรงกับหัวข้อ IQA</div></div>'
    + '</div>';

  if (!pages.length) {
    container.innerHTML = html + '<div class="qa-alert qa-alert-info"><i class="bi bi-info-circle-fill"></i><span>ไม่มีข้อมูล</span></div>';
    return;
  }

  html += '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;">';
  pages.forEach(function(page) {
    var mapping  = APP.iqaMapping[page.id] || {};
    var fieldCount = 0;
    Object.values(mapping).forEach(function(v){ if(v && v.formId) fieldCount++; });
    var secCount = page.sections ? page.sections.filter(function(s){return s.trim();}).length : 0;
    var pct = secCount > 0 ? Math.round(fieldCount/secCount*100) : 0;

    var statusColor = fieldCount === 0 ? 'var(--border)' : fieldCount >= secCount ? 'var(--success)' : 'var(--warning)';
    var statusLabel = fieldCount === 0 ? 'ยังไม่ Mapped'
      : fieldCount >= secCount ? 'Mapped ครบ'
      : 'Mapped '+fieldCount+'/'+secCount;

    html += '<div class="qa-iqa-pub-card" style="cursor:pointer;transition:all .2s;" '
      + 'onclick="iqaGoStep2(\''+escHtml(page.id)+'\')"'
      + ' onmouseover="this.style.borderColor=\'var(--primary)\';this.style.transform=\'translateY(-2px)\'"'
      + ' onmouseout="this.style.borderColor=\'\';this.style.transform=\'\'">'
      + '<div style="padding:12px 14px;">'
      + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'
      + '<span style="font-size:.7rem;background:var(--info-l);color:var(--info);padding:2px 8px;border-radius:20px;font-weight:700;">'+page.phase+'</span>'
      + '<span style="font-weight:700;font-size:.86rem;color:var(--txt);flex:1;">'+escHtml(page.name)+'</span>'
      + '<i class="bi bi-chevron-right" style="color:var(--txt-muted);font-size:.8rem;"></i>'
      + '</div>'
      + '<div style="font-size:.72rem;color:var(--txt-muted);font-family:monospace;margin-bottom:8px;">'+escHtml(page.route)+'</div>'
      + '<div style="display:flex;align-items:center;gap:8px;">'
      + '<div style="flex:1;height:4px;background:var(--border);border-radius:2px;">'
      + '<div style="height:4px;background:'+statusColor+';border-radius:2px;width:'+Math.min(pct,100)+'%;transition:width .4s;"></div>'
      + '</div>'
      + '<span style="font-size:.7rem;font-weight:700;color:'+statusColor+';white-space:nowrap;">'+statusLabel+'</span>'
      + '</div>'
      + '</div></div>';
  });
  html += '</div>';

  container.innerHTML = html;
}

function iqaGoStep2(pageId) {
  _iqaSelectedPageId = pageId;
  var page = IQA_PAGES[pageId];
  if (!page) return;

  var container = document.getElementById("iqa-page-list");
  if (!container) return;

  var mapping = APP.iqaMapping[pageId] || {};
  var fOpts = '<option value="">-- เลือก Form --</option>';
  APP.forms.forEach(function(f) {
    if (!f.isActive) return;
    var sec = null;
    for (var si=0; si<APP.sections.length; si++) {
      if (APP.sections[si].sectionId===f.sectionId){sec=APP.sections[si];break;}
    }
    fOpts += '<option value="'+escHtml(f.formId)+'">'+escHtml(f.formName+(sec?" ["+sec.sectionName+"]":""))+'</option>';
  });

  var html = '<div style="margin-bottom:12px;">'
    + '<button class="qa-btn-ghost btn-sm" onclick="_iqaShowStep1()">'
    + '<i class="bi bi-arrow-left me-1"></i>กลับ Step 1</button></div>';

  html += '<div class="qa-glass-card p-4">'
    + '<h6 class="fw-700 mb-1"><i class="bi bi-diagram-3-fill text-info me-2"></i>'
    + escHtml(page.name)+'</h6>'
    + '<p class="text-muted small mb-4">'+escHtml(page.route)+'</p>';

  var labels = page.sections || [];
  labels.forEach(function(label, idx) {
    if (!label || !label.trim()) return;
    var cur = mapping[label] || {};
    var curFormId  = cur.formId  || "";
    var curFieldKey= cur.fieldKey|| "";
    var isMapped   = !!(curFormId);

    var fieldOpts = '<option value="">-- ทั้ง Form (ภาพรวม) --</option>';
    if (curFormId) {
      var curForm = null;
      for (var fi=0;fi<APP.forms.length;fi++){if(APP.forms[fi].formId===curFormId){curForm=APP.forms[fi];break;}}
      if (curForm) {
        (curForm.fields||[]).forEach(function(fld){
          if (!fld.label||fld.type==="divider") return;
          fieldOpts += '<option value="'+escHtml(fld.key)+'"'+(curFieldKey===fld.key?" selected":"")+'>'+escHtml(fld.label)+'</option>';
        });
      }
    }

    // ✅ แก้ไข: เปลี่ยน display เป็น flex แทน block เพื่อให้ Layout ไม่เพี้ยน
    html += '<div class="iqa-map-row'+(isMapped?" mapped":"")+'" id="iqa-map-row-'+idx+'" style="margin-bottom:16px;">'
      + '<div class="iqa-map-label" style="font-size:.85rem; font-weight:700; margin-bottom:10px;">'+(isMapped?'<i class="bi bi-check-circle-fill text-success me-1"></i>':'')
      + escHtml(label)+'</div>'
      
      + '<div class="iqa-map-controls" style="display:flex; flex-direction:column; gap:10px; padding-left:12px; border-left:2px solid var(--border);">'
      
      + '  <div class="iqa-step" style="display:flex; align-items:center; gap:12px;">'
      + '    <span class="iqa-step-num" style="width:26px; height:26px; border-radius:50%; background:var(--primary); color:white; font-size:.8rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0;">1</span>'
      + '    <select class="qa-input iqa-form-sel" style="flex:1;font-size:.84rem; padding:8px 12px; background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r-sm);"'
      + '      data-pageid="'+escHtml(pageId)+'" data-label="'+escHtml(label)+'" data-idx="'+idx+'"'
      + '      onchange="iqaOnFormChangeSel(this)">'
      +      fOpts.replace('<option value="'+escHtml(curFormId)+'"', '<option value="'+escHtml(curFormId)+'" selected')
      + '    </select>'
      + '  </div>'
      
      // ตรงส่วนนี้คือตัวสำคัญที่เปลี่ยน "display:flex" แทน "none" เมื่อถูกเลือก
      + '  <div class="iqa-step" id="iqa-field-row-'+idx+'" style="display:'+(curFormId?"flex":"none")+'; align-items:center; gap:12px;">'
      + '    <span class="iqa-step-num iqa-step-num-2" style="width:26px; height:26px; border-radius:50%; background:var(--info); color:white; font-size:.8rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; opacity:0.9;">2</span>'
      + '    <select class="qa-input iqa-field-sel" style="flex:1;font-size:.84rem; padding:8px 12px; background:var(--surface-3); border:1.5px dashed var(--border-2); border-radius:var(--r-sm);"'
      + '      data-pageid="'+escHtml(pageId)+'" data-label="'+escHtml(label)+'"'
      + '      onchange="iqaOnFieldChangeSel(this)">'
      +      fieldOpts
      + '    </select>'
      + '  </div>'
      
      + (isMapped ? '<div style="margin-left:38px;"><div class="iqa-current-badge mt-1" style="padding:4px 10px; background:var(--success-l); color:var(--success); border-radius:var(--r-sm); font-size:.72rem; font-weight:700; display:inline-flex; align-items:center;"><i class="bi bi-check-circle-fill me-1"></i>Mapped สำเร็จ</div></div>' : "")
      + '</div></div>';
  });

  html += '<div class="d-flex gap-2 mt-4">'
    + '<button class="qa-btn-danger btn-sm"'
    + ' data-pageid="'+escHtml(pageId)+'"'
    + ' onclick="iqaClearPageMappingBtn(this)">'
    + '<i class="bi bi-eraser-fill me-1"></i>ล้าง Mapping ทั้งหมด</button>'
    + '</div>';

  html += '</div>';
  container.innerHTML = html;
}

function iqaOnFormChangeSel(sel) {
  var pageId = sel.getAttribute("data-pageid") || "";
  var label  = sel.getAttribute("data-label")  || "";
  var idx    = sel.getAttribute("data-idx")    || "0";
  var formId = sel.value;
  
  var fieldRow = document.getElementById("iqa-field-row-"+idx);
  // ✅ แก้ไข: เปลี่ยนคำสั่งให้โชว์เป็น flex แทน block 
  if (fieldRow) fieldRow.style.display = formId ? "flex" : "none";
  
  if (formId) {
    var fldSel = fieldRow ? fieldRow.querySelector(".iqa-field-sel") : null;
    if (fldSel) {
      var opts = '<option value="">-- ทั้ง Form (ภาพรวม) --</option>';
      var form = null;
      for (var i=0;i<APP.forms.length;i++){if(APP.forms[i].formId===formId){form=APP.forms[i];break;}}
      if (form) {
        (form.fields||[]).forEach(function(fld){
          if(!fld.label||fld.type==="divider") return;
          opts += '<option value="'+escHtml(fld.key)+'">'+escHtml(fld.label)+'</option>';
        });
      }
      fldSel.innerHTML = opts;
      fldSel.setAttribute("data-pageid", pageId);
      fldSel.setAttribute("data-label",  label);
    }
  }
  iqaSetFieldMappingDirect(pageId, label, formId, "");
}

function iqaOnFieldChangeSel(sel) {
  var pageId   = sel.getAttribute("data-pageid") || "";
  var label    = sel.getAttribute("data-label")  || "";
  var fieldKey = sel.value;
  var row = sel.closest(".iqa-map-controls");
  var formSel = row ? row.querySelector(".iqa-form-sel") : null;
  var formId  = formSel ? formSel.value : "";
  iqaSetFieldMappingDirect(pageId, label, formId, fieldKey);
}

function iqaClearPageMappingBtn(btn) {
  var pageId = btn.getAttribute("data-pageid") || "";
  if (pageId) { iqaClearPageMapping(pageId); }
}

function iqaSetFieldMappingDirect(pageId, label, formId, fieldKey) {
  if (!APP.iqaMapping) APP.iqaMapping = {};
  if (!APP.iqaMapping[pageId]) APP.iqaMapping[pageId] = {};
  if (formId) {
    APP.iqaMapping[pageId][label] = { formId: formId, fieldKey: fieldKey };
  } else {
    delete APP.iqaMapping[pageId][label];
  }
  if (typeof _iqaPendingChanges !== "undefined") _iqaPendingChanges++;
  _updateIqaSaveBtn();
}

function _iqaBuildFieldOpts(formId, selectedKey) {
  if (!formId) return '<option value="">-- เลือก Form ก่อน --</option>';
  var form = APP.forms.find(function(f){ return f.formId === formId; });
  if (!form || !form.fields || !form.fields.length) return '<option value="">-- Form นี้ไม่มีฟิลด์ --</option>';
  var opts = '<option value="">-- Field --</option>';
  form.fields.forEach(function(field) {
    opts += '<option value="'+escHtml(field.key)+'"'+(selectedKey===field.key?' selected':'')+'>'+escHtml(field.label)+'</option>';
  });
  return opts;
}

function iqaOnFormChange(selEl, rowIdx, label) {
  var formId = selEl.value;
  var fieldSel = document.getElementById("iqa-field-sel-"+rowIdx);
  if (fieldSel) fieldSel.innerHTML = _iqaBuildFieldOpts(formId, "");
  if (_iqaSelectedPageId) {
    if (!APP.iqaMapping[_iqaSelectedPageId]) APP.iqaMapping[_iqaSelectedPageId] = {};
    delete APP.iqaMapping[_iqaSelectedPageId][label];
  }
}

function iqaSetFieldMapping(pageId, label, formId, fieldKey) {
  if (!APP.iqaMapping[pageId]) APP.iqaMapping[pageId] = {};
  if (formId && fieldKey) {
    APP.iqaMapping[pageId][label] = { formId: formId, fieldKey: fieldKey };
  } else {
    delete APP.iqaMapping[pageId][label];
  }
}

function iqaClearPageMapping(pageId) {
  APP.iqaMapping[pageId] = {};
  showToast("ล้าง Mapping ของหน้านี้แล้ว", "info");
  iqaGoStep2(pageId);
}

function iqaSaveAllMappings() {
  var btn = document.querySelector('[onclick="iqaSaveAllMappings()"]');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> บันทึก...'; }
  
  google.script.run
    .withSuccessHandler(function(res) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-save-fill me-1"></i>บันทึก Mapping'; }
      if (res && res.success) {
        showToast("บันทึก IQA Mapping สำเร็จ", "success");
        _iqaPendingChanges = 0;
        _updateIqaSaveBtn();
      } else showToast((res && res.message) || "เกิดข้อผิดพลาด", "danger");
    })
    .withFailureHandler(function(err) {
      if (btn) { btn.disabled = false; btn.innerHTML = '<i class="bi bi-save-fill me-1"></i>บันทึก Mapping'; }
      showToast(err.message || err, "danger");
    })
    .saveIqaMappingData(APP.iqaMapping || {}); 
}

function renderIqaPublicView() {
  var yearEl = document.getElementById("public-year-select");
  var year   = yearEl ? yearEl.value : "";
  var container = document.getElementById("iqa-view-content");
  if (!container) return;

  var pagesP1 = _iqaGetUniquePages("Phase1");
  var pagesP2 = _iqaGetUniquePages("Phase2");

  var html = '<div class="qa-iqa-phase-bar">'
    + '<button class="qa-btn-primary btn-sm" id="iqa-pub-p1-btn" onclick="iqaPubSelectPhase(1)">'
    + '<i class="bi bi-1-circle-fill me-1"></i>Phase 1 ข้อมูลพื้นฐาน</button>'
    + '<button class="qa-btn-ghost btn-sm" id="iqa-pub-p2-btn" onclick="iqaPubSelectPhase(2)">'
    + '<i class="bi bi-2-circle-fill me-1"></i>Phase 2 ประเมินคุณภาพ</button>'
    + '</div>'
    + '<div id="iqa-pub-phase1">'+ _buildIqaPubAccordions(pagesP1, year) +'</div>'
    + '<div id="iqa-pub-phase2" style="display:none;">'+ _buildIqaPubAccordions(pagesP2, year) +'</div>';

  container.innerHTML = html;
}

function iqaPubSelectPhase(n) {
  var p1 = document.getElementById("iqa-pub-phase1");
  var p2 = document.getElementById("iqa-pub-phase2");
  var b1 = document.getElementById("iqa-pub-p1-btn");
  var b2 = document.getElementById("iqa-pub-p2-btn");
  if (p1) p1.style.display = n === 1 ? "block" : "none";
  if (p2) p2.style.display = n === 2 ? "block" : "none";
  if (b1) b1.className = n === 1 ? "qa-btn-primary btn-sm" : "qa-btn-ghost btn-sm";
  if (b2) b2.className = n === 2 ? "qa-btn-primary btn-sm" : "qa-btn-ghost btn-sm";
}

function _buildIqaPubAccordions(pages, year) {
  if (!pages.length) return '<div class="qa-alert qa-alert-info"><i class="bi bi-info-circle-fill"></i><span>ไม่มีข้อมูล</span></div>';
  return pages.map(function(page, pi) {
    var mapping    = APP.iqaMapping[page.id] || {};
    var mappedCount = 0;
    var dataCount   = 0;

    var secHtml = '';
    var sections = (page.sections || []).filter(function(s){ return s.trim(); });
    sections.forEach(function(label) {
      var mapVal  = mapping[label] || {};
      var formId  = mapVal.formId  || "";
      var fieldKey = mapVal.fieldKey || "";
      var secId   = "";

      var formObj = formId ? APP.forms.find(function(f){ return f.formId === formId; }) : null;
      if (formObj && formObj.sectionId) secId = formObj.sectionId;

      var sub = (secId && year)
        ? APP.dashboard.find(function(d){ return d.sectionId === secId && String(d.year) === String(year); })
        : null;

      var valHtml = '';
      if (formId && fieldKey) {
        mappedCount++;
        if (sub) {
          dataCount++;
          var dataObj = {};
          try { dataObj = JSON.parse(sub.dataJson || "{}"); } catch(e) {}
          var val = dataObj[fieldKey];
          valHtml = '<div class="qa-iqa-val-mapped">'
            + '<i class="bi bi-check-circle-fill me-1"></i>'
            + '<strong>'+(formObj ? escHtml(formObj.formName) : formId)+'</strong>'
            + (val !== undefined && val !== null ? ' — '+escHtml(String(val).substring(0,50)) : '')
            + '</div>';
        } else {
          valHtml = '<div class="qa-iqa-val-pending">'
            + '<i class="bi bi-hourglass-split me-1"></i>'
            + (formObj ? escHtml(formObj.formName) : formId)
            + ' — ยังไม่ส่งข้อมูล</div>';
        }
      } else {
        valHtml = '<div class="qa-iqa-val-none">ยังไม่ได้ Mapping</div>';
      }

      secHtml += '<div class="qa-iqa-field-row">'
        + '<div class="qa-iqa-field-label">'+escHtml(label)+'</div>'
        + '<div class="qa-iqa-field-val">'+valHtml+'</div>'
        + '</div>';
    });

    var badge = dataCount > 0
      ? '<span style="background:var(--success-l);color:var(--success);padding:2px 9px;border-radius:20px;font-size:.67rem;font-weight:700;flex-shrink:0;"><i class="bi bi-check-circle-fill me-1"></i>มีข้อมูล '+dataCount+'</span>'
      : mappedCount > 0
        ? '<span style="background:var(--warning-l);color:var(--warning);padding:2px 9px;border-radius:20px;font-size:.67rem;font-weight:700;flex-shrink:0;">Mapped '+mappedCount+'</span>'
        : '<span style="background:var(--surface-3);color:var(--txt-muted);padding:2px 9px;border-radius:20px;font-size:.67rem;flex-shrink:0;">ยังไม่ Mapped</span>';

    var bodyId = "iqa-pub-body-"+pi;
    return '<div class="qa-iqa-pub-card">'
      + '<div class="qa-iqa-pub-head" onclick="iqaPubToggle(\''+bodyId+'\')" >'
      + '<i class="bi bi-chevron-right" id="arr-'+bodyId+'" style="transition:.2s;color:var(--txt-muted);flex-shrink:0;font-size:.8rem;"></i>'
      + '<span style="font-size:.7rem;background:var(--info-l);color:var(--info);padding:2px 9px;border-radius:20px;font-weight:700;flex-shrink:0;">'+page.phase+'</span>'
      + '<span style="font-weight:700;font-size:.86rem;color:var(--txt);flex:1;">'+escHtml(page.name)+'</span>'
      + badge
      + '<span style="font-size:.68rem;color:var(--txt-muted);font-family:monospace;flex-shrink:0;">'+escHtml(page.route)+'</span>'
      + '</div>'
      + '<div class="qa-iqa-pub-body" id="'+bodyId+'">'
      + '<div style="font-size:.74rem;color:var(--info);margin-bottom:12px;padding:6px 10px;background:var(--info-l);border-radius:var(--r-sm);">'
      + '<i class="bi bi-link-45deg me-1"></i>URL: <strong>https://iqa.ovec.go.th'+escHtml(page.route)+'</strong>'
      + '</div>'
      + secHtml
      + '</div></div>';
  }).join('');
}

function iqaPubToggle(bodyId) {
  var el  = document.getElementById(bodyId);
  var arr = document.getElementById("arr-"+bodyId);
  if (!el) return;
  var isOpen = el.classList.contains("open");
  el.classList.toggle("open", !isOpen);
  if (arr) arr.style.transform = isOpen ? "" : "rotate(90deg)";
}

function iqaConfirmSave() {
  if (_iqaPendingChanges === 0) {
    showToast("ไม่มีการเปลี่ยนแปลงที่ต้องบันทึก","info");
    return;
  }
  var useModal = document.getElementById("modal-iqa-confirm");
  if (useModal) {
    document.getElementById("iqa-confirm-count").innerText = _iqaPendingChanges;
    var emailInput = document.getElementById("iqa-confirm-email-input");
    if (emailInput) emailInput.value = "";
    var errEl = document.getElementById("iqa-confirm-email-err");
    if (errEl) errEl.style.display = "none";
    new bootstrap.Modal(useModal).show();
  } else {
    iqaSaveAllMappings();
  }
}
function iqaExecuteSave() {
  var emailInput = document.getElementById("iqa-confirm-email-input");
  var inputVal  = emailInput ? emailInput.value.trim().toLowerCase() : "";
  var adminEmail = (APP.user && APP.user.email || "").toLowerCase();
  var errEl = document.getElementById("iqa-confirm-email-err");
  if (inputVal !== adminEmail) {
    if (errEl) errEl.style.display = "block";
    showToast("อีเมลไม่ตรงกัน","warning");
    return;
  }
  if (errEl) errEl.style.display = "none";
  var mi = bootstrap.Modal.getInstance(document.getElementById("modal-iqa-confirm"));
  if (mi) mi.hide();
  iqaSaveAllMappings();
}
</script>
